<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Paris · Élections Municipales</title>

<!-- Google Fonts -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<!-- Leaflet -->

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV/XN/WLEg=" crossorigin=""></script>

<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; font-family:'DM Sans',system-ui,sans-serif; background:#f0ede6; }

/* ── HEADER ── */
#hdr {
  position:fixed; inset:0 0 auto 0; z-index:1000;
  background:rgba(255,253,248,.97); backdrop-filter:blur(14px);
  border-bottom:1px solid #e2ddd3;
  padding:10px 14px 8px;
  box-shadow:0 1px 8px rgba(0,0,0,.07);
}
.hdr-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.brand { font-family:'Syne',sans-serif; font-size:17px; font-weight:800; color:#111; letter-spacing:-.4px; }
.brand b { color:#d92b2b; font-weight:800; }
.part  { font-size:12px; color:#aaa; }
.part strong { color:#333; }

/* Pills row */
.pills { display:flex; gap:5px; overflow-x:auto; padding-bottom:2px; scrollbar-width:none; }
.pills::-webkit-scrollbar { display:none; }
.seg { display:flex; background:#ede9e0; border-radius:20px; padding:2px; gap:1px; flex-shrink:0; }
.seg button {
  padding:5px 11px; border:none; border-radius:16px; cursor:pointer;
  font-family:'DM Sans',sans-serif; font-size:12px; font-weight:500; color:#888;
  background:transparent; transition:all .14s; white-space:nowrap;
}
.seg button.on { background:#fff; color:#111; font-weight:600; box-shadow:0 1px 4px rgba(0,0,0,.10); }
.action {
  padding:5px 12px; border:none; border-radius:20px; cursor:pointer; flex-shrink:0;
  font-family:'DM Sans',sans-serif; font-size:12px; font-weight:600;
  background:#ede9e0; color:#666; transition:all .15s;
}
.action:hover { background:#ddd8cd; }
.action.amber { background:#fff8e6; color:#b07000; }
.action.red   { background:#fff0f0; color:#cc2222; }
.live-dot { display:inline-block; width:6px; height:6px; border-radius:50%; background:currentColor; margin-right:4px; vertical-align:middle; }
.blinking { animation:blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

/* ── MAP ── */
#map { position:fixed; inset:0; z-index:1; }

/* Leaflet tweaks */
.leaflet-container { font-family:'DM Sans',sans-serif !important; }
.leaflet-control-zoom {
  border:none !important; border-radius:12px !important; overflow:hidden;
  box-shadow:0 2px 12px rgba(0,0,0,.13) !important;
}
.leaflet-control-zoom a {
  width:36px !important; height:36px !important; line-height:36px !important;
  background:#fff !important; color:#444 !important; border:none !important;
  border-bottom:1px solid #ede9e0 !important; font-size:18px !important; font-weight:300 !important;
}
.leaflet-control-zoom a:last-child { border-bottom:none !important; }
.leaflet-control-zoom a:hover { background:#f5f2ea !important; }
.leaflet-control-attribution { display:none !important; }
/* Custom popup */
.leaflet-popup-content-wrapper {
  border-radius:14px !important; padding:0 !important;
  box-shadow:0 6px 24px rgba(0,0,0,.14) !important; border:1px solid #e2ddd3 !important;
}
.leaflet-popup-content { margin:0 !important; }
.leaflet-popup-tip-container { display:none !important; }
.leaflet-popup-close-button { top:8px !important; right:8px !important; color:#bbb !important; font-size:18px !important; }

/* ── LEGEND ── */
#legend {
  position:fixed; right:10px; z-index:500;
  background:rgba(255,253,248,.95); backdrop-filter:blur(10px);
  border:1px solid #e2ddd3; border-radius:12px;
  padding:10px 12px; box-shadow:0 2px 10px rgba(0,0,0,.06); max-width:152px;
}
.leg-ttl { font-size:9px; font-weight:700; color:#bbb; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:7px; }
.leg-row { display:flex; align-items:center; gap:7px; margin-bottom:5px; }
.leg-dot { width:9px; height:9px; border-radius:2px; flex-shrink:0; }
.leg-lbl { font-size:11px; color:#444; line-height:1.3; }

/* ── ZOOM HINT ── */
#hint {
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%); z-index:500;
  background:rgba(20,20,20,.68); backdrop-filter:blur(8px); color:#fff;
  padding:7px 16px; border-radius:20px; font-size:12px;
  pointer-events:none; white-space:nowrap; transition:opacity .35s;
}

/* ── BOTTOM SHEET ── */
#sheet {
  position:fixed; inset:auto 0 0 0; z-index:900;
  background:#fffdf8; border-radius:20px 20px 0 0;
  box-shadow:0 -2px 24px rgba(0,0,0,.11); border-top:1.5px solid #e2ddd3;
  transform:translateY(100%); transition:transform .3s cubic-bezier(.4,0,.2,1);
  max-height:78vh; display:flex; flex-direction:column;
}
#sheet.peek { transform:translateY(calc(100% - 68px)); }
#sheet.open { transform:translateY(0); }

.sh-handle-wrap { padding:10px 0 3px; display:flex; justify-content:center; cursor:pointer; flex-shrink:0; }
.sh-handle { width:38px; height:4px; border-radius:2px; background:#ddd; }

.sh-head {
  flex-shrink:0; padding:2px 18px 12px;
  border-bottom:1px solid #ede9e0;
  display:flex; align-items:flex-start; justify-content:space-between;
}
.sh-title { font-family:'Syne',sans-serif; font-size:20px; font-weight:800; color:#111; letter-spacing:-.4px; }
.sh-meta  { font-size:12px; color:#bbb; margin-top:3px; }
.sh-close { background:#ede9e0; border:none; width:28px; height:28px; border-radius:8px; cursor:pointer; font-size:14px; color:#888; display:flex; align-items:center; justify-content:center; margin-top:2px; flex-shrink:0; }
.sh-close:hover { background:#ddd8cd; }

.sh-body { flex:1; overflow-y:auto; padding:14px 18px 40px; -webkit-overflow-scrolling:touch; }
.sh-body::-webkit-scrollbar { width:3px; }
.sh-body::-webkit-scrollbar-thumb { background:#ddd; border-radius:2px; }

/* Winner */
.win-card { border-radius:12px; padding:13px 15px; margin-bottom:16px; display:flex; align-items:center; gap:10px; }
.win-sw  { width:12px; height:12px; border-radius:3px; flex-shrink:0; }
.win-nm  { font-family:'Syne',sans-serif; font-size:15px; font-weight:800; color:#111; }
.win-pt  { font-size:11px; color:#aaa; margin-top:1px; }
.win-sc  { font-family:'Syne',sans-serif; font-size:28px; font-weight:800; flex-shrink:0; }

/* Bars */
.sec { font-size:10px; font-weight:700; color:#ccc; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:9px; }
.bar { margin-bottom:11px; }
.bar-hd { display:flex; justify-content:space-between; font-size:12px; margin-bottom:4px; }
.bar-nm { font-weight:500; color:#333; }
.bar-st { color:#aaa; }
.bar-bg { height:6px; border-radius:3px; background:#ede9e0; overflow:hidden; }
.bar-fl { height:100%; border-radius:3px; transition:width .55s cubic-bezier(.4,0,.2,1); }

/* BV list */
.bv { display:flex; align-items:center; gap:8px; padding:7px 8px; border-radius:9px; cursor:pointer; }
.bv:hover, .bv:active { background:#ede9e0; }
.bv-c { width:8px; height:8px; border-radius:2px; flex-shrink:0; }
.bv-id { font-size:11px; color:#ccc; width:36px; flex-shrink:0; }
.bv-nm { font-size:12px; color:#333; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.bv-pc { font-size:12px; color:#aaa; }

hr.div { border:none; border-top:1px solid #ede9e0; margin:14px 0; }

/* Desktop: side panel */
@media (min-width:640px) {
  #sheet {
    inset:0 0 0 auto; width:320px;
    border-radius:0; max-height:none; border-top:none; border-left:1.5px solid #e2ddd3;
    transform:translateX(100%); box-shadow:-4px 0 20px rgba(0,0,0,.06);
  }
  #sheet.open, #sheet.peek { transform:translateX(0); }
  .sh-handle-wrap { display:none; }
  #legend { bottom:20px; }
  #hint   { bottom:20px; }
}
</style>

</head>
<body>

<!-- HEADER -->

<div id="hdr">
  <div class="hdr-top">
    <div class="brand">Paris<b>·Vote</b></div>
    <div class="part">Participation&nbsp;<strong id="part-num">—</strong></div>
  </div>
  <div class="pills">
    <div class="seg" id="sg-yr">
      <button data-v="2014" onclick="setYear(this)">2014</button>
      <button data-v="2020" class="on" onclick="setYear(this)">2020</button>
    </div>
    <div class="seg" id="sg-tr">
      <button data-v="T1" onclick="setTour(this)">1er tour</button>
      <button data-v="T2" class="on" onclick="setTour(this)">2e tour</button>
    </div>
    <div class="seg" id="sg-vw">
      <button data-v="cand" class="on" onclick="setView(this)">Candidats</button>
      <button data-v="bloc" onclick="setView(this)">Blocs</button>
    </div>
    <button class="action" id="btn-anim" onclick="runAnim()">▶ 2014→2020</button>
    <button class="action" id="btn-live" onclick="toggleLive()">
      <span class="live-dot" id="live-dot"></span>Live
    </button>
  </div>
</div>

<!-- MAP -->

<div id="map"></div>

<!-- LEGEND -->

<div id="legend">
  <div class="leg-ttl">Légende</div>
  <div id="leg-body"></div>
</div>

<!-- HINT -->

<div id="hint">Zoomez ou tapez un arrondissement</div>

<!-- SHEET -->

<div id="sheet">
  <div class="sh-handle-wrap" id="sh-drag"><div class="sh-handle"></div></div>
  <div class="sh-head">
    <div>
      <div class="sh-title" id="sh-ttl">—</div>
      <div class="sh-meta"  id="sh-meta">—</div>
    </div>
    <button class="sh-close" onclick="closeSheet()">✕</button>
  </div>
  <div class="sh-body" id="sh-body"></div>
</div>

<script>
'use strict';
// ════════════════════════════════════════════════════════════
// WAIT FOR LEAFLET
// ════════════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', init);

// ════════════════════════════════════════════════════════════
// POLITICAL DATA
// ════════════════════════════════════════════════════════════
const BLOCS = {
  gauche:{ color:'#d92b2b', label:'Gauche'  },
  centre:{ color:'#d97706', label:'Centre'  },
  droite:{ color:'#1d4ed8', label:'Droite'  },
  divers:{ color:'#6b7280', label:'Divers'  },
};
const CANDS = {
  '2014':[
    {id:'hidalgo',   name:'Hidalgo',   party:'PS',   bloc:'gauche', color:'#d92b2b'},
    {id:'nkm',       name:'NKM',       party:'UMP',  bloc:'droite', color:'#1d4ed8'},
    {id:'najdovski', name:'Najdovski', party:'EELV', bloc:'gauche', color:'#16a34a'},
  ],
  '2020':[
    {id:'hidalgo',   name:'Hidalgo',   party:'PS',   bloc:'gauche', color:'#d92b2b'},
    {id:'dati',      name:'Dati',      party:'LR',   bloc:'droite', color:'#1d4ed8'},
    {id:'buzyn',     name:'Buzyn',     party:'LREM', bloc:'centre', color:'#d97706'},
    {id:'belliard',  name:'Belliard',  party:'EELV', bloc:'gauche', color:'#16a34a'},
    {id:'villani',   name:'Villani',   party:'Ind',  bloc:'gauche', color:'#7c3aed'},
  ],
};
const BIAS = {
  1:[.40,.50], 2:[.38,.52], 3:[.55,.38], 4:[.52,.40], 5:[.55,.38],
  6:[.45,.46], 7:[.28,.62], 8:[.22,.68], 9:[.48,.42],10:[.65,.28],
 11:[.68,.25],12:[.58,.33],13:[.63,.27],14:[.58,.33],15:[.44,.46],
 16:[.18,.74],17:[.42,.48],18:[.72,.20],19:[.70,.22],20:[.73,.20],
};
// Approximate lat/lng center of each arrondissement
const ARR_CTR = {
  1:[48.8607,2.3470], 2:[48.8671,2.3499], 3:[48.8632,2.3593], 4:[48.8533,2.3530],
  5:[48.8480,2.3506], 6:[48.8503,2.3344], 7:[48.8566,2.3177], 8:[48.8753,2.3094],
  9:[48.8763,2.3379],10:[48.8750,2.3621],11:[48.8588,2.3773],12:[48.8402,2.3924],
 13:[48.8282,2.3572],14:[48.8280,2.3258],15:[48.8418,2.2997],16:[48.8635,2.2669],
 17:[48.8838,2.3133],18:[48.8918,2.3452],19:[48.8824,2.3862],20:[48.8637,2.3990],
};
// Bounding box corners [s,w,n,e] for each arrondissement
const ARR_BOX = {
  1: [48.853,2.331,48.868,2.358],  2: [48.860,2.342,48.873,2.360],
  3: [48.856,2.352,48.869,2.369],  4: [48.847,2.342,48.860,2.362],
  5: [48.840,2.340,48.853,2.360],  6: [48.843,2.327,48.856,2.348],
  7: [48.848,2.295,48.867,2.326],  8: [48.866,2.292,48.884,2.326],
  9: [48.870,2.327,48.884,2.357], 10:[48.865,2.350,48.884,2.378],
 11:[48.849,2.360,48.870,2.393], 12:[48.826,2.368,48.856,2.418],
 13:[48.812,2.340,48.842,2.375], 14:[48.815,2.308,48.840,2.344],
 15:[48.827,2.279,48.856,2.316], 16:[48.839,2.240,48.882,2.290],
 17:[48.874,2.295,48.900,2.336], 18:[48.877,2.326,48.906,2.376],
 19:[48.864,2.361,48.900,2.408], 20:[48.847,2.382,48.879,2.422],
};

// ════════════════════════════════════════════════════════════
// MOCK DATA
// ════════════════════════════════════════════════════════════
function rng(seed){ let s=seed; return ()=>{ s=(s*9301+49297)%233280; return s/233280; }; }
const DB = (function(){
  const db={};
  for(let arr=1;arr<=20;arr++){
    const r=rng(arr*137+7);
    const [s,w,n,e]=ARR_BOX[arr];
    const nb=8+Math.floor(arr*1.3);
    db[arr]={};
    for(let i=0;i<nb;i++){
      const id=arr+'-'+String(i+1).padStart(2,'0');
      const lat=s+r()*(n-s), lng=w+r()*(e-w);
      const ins=700+Math.floor(r()*700);
      const bv={id,lat,lng,inscrits:ins,results:{}};
      ['2014','2020'].forEach(yr=>{
        ['T1','T2'].forEach(t=>{
          const key=yr+'-'+t;
          const r2=rng(arr*100+i*13+(yr==='2014'?0:500)+(t==='T1'?0:250));
          const cs=CANDS[yr], b=BIAS[arr];
          const gn=cs.filter(c=>c.bloc==='gauche').length||1;
          const dn=cs.filter(c=>c.bloc==='droite').length||1;
          const on=Math.max(1,cs.length-gn-dn);
          const part=0.40+r2()*0.25, total=Math.floor(ins*part);
          const sc={}; let rem=total;
          cs.forEach((c,ci)=>{
            const base=c.bloc==='gauche'?b[0]/gn:c.bloc==='droite'?b[1]/dn:(1-b[0]-b[1])/on;
            const v=ci===cs.length-1?rem:Math.min(rem,Math.max(0,Math.round(total*Math.max(0.02,base+(r2()-.5)*.16))));
            sc[c.id]=v; rem-=v;
          });
          const w2=cs.reduce((a,x)=>sc[a.id]>sc[x.id]?a:x);
          bv.results[key]={total,inscrits:ins,scores:sc,winner:w2.id,part};
        });
      });
      db[arr][id]=bv;
    }
  }
  return db;
})();

// ════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════
const ST={year:'2020',tour:'T2',view:'cand',selArr:null,live:false};
let liveTimer=null, animRunning=false;
function ekey(){ return ST.year+'-'+ST.tour; }

function arrResult(arr){
  const key=ekey(), bvs=Object.values(DB[arr]);
  const wins={},vots={}; let tv=0,ti=0;
  bvs.forEach(bv=>{
    const r=bv.results[key]; if(!r)return;
    wins[r.winner]=(wins[r.winner]||0)+1;
    tv+=r.total; ti+=bv.inscrits;
    CANDS[ST.year].forEach(c=>{ vots[c.id]=(vots[c.id]||0)+(r.scores[c.id]||0); });
  });
  const top=Object.entries(wins).sort((a,b)=>b[1]-a[1])[0];
  if(!top)return null;
  const cand=CANDS[ST.year].find(c=>c.id===top[0]);
  const color=ST.view==='bloc'?(BLOCS[cand.bloc]?.color||'#888'):cand.color;
  return{cand,color,bvPct:Math.round(top[1]/bvs.length*100),tv,ti,wins,vots,nb:bvs.length};
}
function candCol(yr,id){
  const c=CANDS[yr].find(x=>x.id===id);
  return ST.view==='bloc'?(BLOCS[c?.bloc]?.color||'#888'):(c?.color||'#888');
}

// ════════════════════════════════════════════════════════════
// INIT — called once DOM+Leaflet are ready
// ════════════════════════════════════════════════════════════
let map, arrGroup, bvGroup;

function init(){
  // ── MAP SETUP ──
  map = L.map('map',{
    center:[48.857,2.347], zoom:12,
    zoomControl:false, maxZoom:19, minZoom:11,
    tap:true,
  });

  // Light tile layer — Stadia Maps (no API key needed, CORS-friendly)
  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{
    maxZoom:19,
    attribution:'© OpenStreetMap',
  }).addTo(map);

  L.control.zoom({position:'bottomright'}).addTo(map);

  // Layer groups
  arrGroup = L.layerGroup().addTo(map);
  bvGroup  = L.layerGroup().addTo(map);

  // ── BUILD ARR LAYERS ──
  buildArrLayers();

  // ── HEADER HEIGHT → map padding ──
  function padMap(){
    const h=document.getElementById('hdr').offsetHeight;
    map.setView(map.getCenter(),map.getZoom()); // refresh
    // Move zoom control below header
    const zc=document.querySelector('.leaflet-control-zoom');
    if(zc) zc.style.marginBottom='8px';
    document.getElementById('legend').style.top=(h+10)+'px';
    document.getElementById('hint').style.bottom='20px';
  }
  padMap();
  window.addEventListener('resize',padMap);

  // ── ZOOM EVENT → show/hide BV ──
  let prevZ=map.getZoom();
  map.on('zoomend',function(){
    const z=map.getZoom(), wasHigh=prevZ>=14, isHigh=z>=14;
    prevZ=z;
    document.getElementById('hint').style.opacity=isHigh?'0':'1';
    if(wasHigh!==isHigh){ updateArrOpacity(); rebuildBV(); }
  });

  // ── CLICK ON MAP BG → close sheet ──
  map.on('click',()=>{
    const s=document.getElementById('sheet');
    if(s.classList.contains('open')) s.classList.replace('open','peek');
  });

  // ── RENDER INITIAL ──
  renderAll();

  // ── DRAG GESTURE on sheet ──
  initSheetDrag();
}

// ════════════════════════════════════════════════════════════
// LAYERS
// ════════════════════════════════════════════════════════════
const rects={}, labels={};

function buildArrLayers(){
  arrGroup.clearLayers();
  for(let arr=1;arr<=20;arr++){
    const [s,w,n,e]=ARR_BOX[arr];
    // Rectangle with rounded-ish appearance via fillOpacity
    const rect=L.rectangle([[s,w],[n,e]],{
      color:'#fff', weight:2,
      fillColor:'#ccc', fillOpacity:.65,
      className:'arr-rect',
    });
    rect.on('click',()=>openSheet(arr));
    rect.on('mouseover',function(){ this.setStyle({fillOpacity:.84,weight:3}); });
    rect.on('mouseout', function(){ this.setStyle({fillOpacity:isBVVisible()?.2:.65,weight:2}); });
    rects[arr]=rect;
    arrGroup.addLayer(rect);

    // Arrondissement number label
    const lbl=L.marker(ARR_CTR[arr],{
      icon:L.divIcon({
        className:'',
        html:'<div style="font-family:Syne,sans-serif;font-weight:800;font-size:13px;'
          +'color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.4);text-align:center;'
          +'width:28px;margin-left:-14px;margin-top:-9px;pointer-events:none;">'+arr+'</div>',
        iconSize:[28,18], iconAnchor:[14,9],
      }),
      interactive:false, zIndexOffset:-100,
    });
    labels[arr]=lbl;
    arrGroup.addLayer(lbl);
  }
}

function isBVVisible(){ return map && map.getZoom()>=14; }

function updateArrOpacity(){
  const op=isBVVisible()?.2:.65;
  for(let arr=1;arr<=20;arr++){
    if(rects[arr]) rects[arr].setStyle({fillOpacity:op});
  }
}

function updateArrColors(){
  for(let arr=1;arr<=20;arr++){
    if(!rects[arr])continue;
    const info=arrResult(arr);
    rects[arr].setStyle({ fillColor:info?.color||'#bbb' });
  }
}

function rebuildBV(){
  bvGroup.clearLayers();
  if(!isBVVisible())return;
  const key=ekey();
  for(let arr=1;arr<=20;arr++){
    if(ST.selArr&&arr!==ST.selArr)continue;
    Object.values(DB[arr]).forEach(bv=>{
      const r=bv.results[key]; if(!r)return;
      const col=candCol(ST.year,r.winner);
      const m=L.circleMarker([bv.lat,bv.lng],{
        radius:7, fillColor:col, fillOpacity:.9,
        color:'#fff', weight:1.5,
      });
      m.bindPopup(bvPopup(bv,r),{maxWidth:230});
      bvGroup.addLayer(m);
    });
  }
}

function bvPopup(bv,r){
  const rows=CANDS[ST.year]
    .map(c=>({c,v:r.scores[c.id]||0})).sort((a,b)=>b.v-a.v).slice(0,3)
    .map(({c,v})=>{
      const pct=Math.round(v/r.total*100);
      const col=ST.view==='bloc'?(BLOCS[c.bloc]?.color||'#888'):c.color;
      return '<div style="display:flex;align-items:center;gap:7px;margin-bottom:5px">'
        +'<div style="width:8px;height:8px;border-radius:2px;background:'+col+';flex-shrink:0"></div>'
        +'<span style="font-size:12px;color:#333;flex:1">'+c.name+'</span>'
        +'<span style="font-size:12px;color:#aaa">'+pct+'%</span></div>';
    }).join('');
  return '<div style="padding:12px 14px 10px;font-family:DM Sans,sans-serif">'
    +'<div style="font-family:Syne,sans-serif;font-weight:800;font-size:13px;color:#111;margin-bottom:3px">Bureau '+bv.id+'</div>'
    +'<div style="font-size:11px;color:#bbb;margin-bottom:9px">'+bv.inscrits+' inscrits · '+Math.round(r.part*100)+'% part.</div>'
    +rows+'</div>';
}

// ════════════════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════════════════
function renderAll(){
  updateArrColors();
  updateArrOpacity();
  if(isBVVisible()) rebuildBV();
  updateLegend();
  updateParticipation();
  // Refresh sheet content (without flyTo) if one is open
  if(ST.selArr) refreshSheetContent(ST.selArr);
}

function updateLegend(){
  const items=ST.view==='bloc'
    ?Object.values(BLOCS).map(b=>({color:b.color,name:b.label}))
    :CANDS[ST.year].map(c=>({color:c.color,name:c.name+' <span style="color:#bbb">'+c.party+'</span>'}));
  document.getElementById('leg-body').innerHTML=items.map(it=>
    '<div class="leg-row"><div class="leg-dot" style="background:'+it.color+'"></div>'
    +'<div class="leg-lbl">'+it.name+'</div></div>').join('');
}

function updateParticipation(){
  let tv=0,ti=0;
  const key=ekey();
  for(let arr=1;arr<=20;arr++)
    Object.values(DB[arr]).forEach(bv=>{const r=bv.results[key];if(r){tv+=r.total;ti+=bv.inscrits;}});
  document.getElementById('part-num').textContent=ti?Math.round(tv/ti*100)+'%':'—';
}

// ════════════════════════════════════════════════════════════
// BOTTOM SHEET
// ════════════════════════════════════════════════════════════
function refreshSheetContent(arr){
  // Re-render sheet body only, no flyTo, no map change
  const key=ekey(), bvs=Object.values(DB[arr]);
  const agg={}; let tv=0,ti=0;
  bvs.forEach(bv=>{
    const r=bv.results[key]; if(!r)return;
    tv+=r.total; ti+=bv.inscrits;
    CANDS[ST.year].forEach(c=>{
      if(!agg[c.id])agg[c.id]={v:0,wins:0,c};
      agg[c.id].v+=r.scores[c.id]||0;
      if(r.winner===c.id)agg[c.id].wins++;
    });
  });
  const sorted=Object.values(agg).sort((a,b)=>b.v-a.v);
  const win=sorted[0], part=ti?Math.round(tv/ti*100):0;
  const wc=ST.view==='bloc'?(BLOCS[win.c.bloc]?.color||'#888'):win.c.color;
  document.getElementById('sh-meta').textContent=bvs.length+' bureaux · Participation '+part+'%';
  const bars=sorted.map(({c,v,wins})=>{
    const pct=Math.round(v/tv*100);
    const col=ST.view==='bloc'?(BLOCS[c.bloc]?.color||'#888'):c.color;
    return '<div class="bar"><div class="bar-hd"><span class="bar-nm">'+c.name
      +' <span style="color:#bbb;font-weight:400">'+c.party+'</span></span>'
      +'<span class="bar-st">'+wins+' BV · '+pct+'%</span></div>'
      +'<div class="bar-bg"><div class="bar-fl" style="width:'+pct+'%;background:'+col+'"></div></div></div>';
  }).join('');
  const bvList=bvs.map(bv=>{
    const r=bv.results[key]; if(!r)return'';
    const cand=CANDS[ST.year].find(c=>c.id===r.winner);
    const col=ST.view==='bloc'?(BLOCS[cand?.bloc]?.color||'#888'):(cand?.color||'#888');
    const pct=Math.round((r.scores[r.winner]||0)/r.total*100);
    return '<div class="bv" onclick="flyBV('+bv.lat+','+bv.lng+')">'
      +'<div class="bv-c" style="background:'+col+'"></div>'
      +'<div class="bv-id">'+bv.id+'</div>'
      +'<div class="bv-nm">'+(cand?.name||'—')+'</div>'
      +'<div class="bv-pc">'+pct+'%</div></div>';
  }).join('');
  document.getElementById('sh-body').innerHTML=
    '<div class="win-card" style="background:'+wc+'15;border-left:4px solid '+wc+'">'
    +'<div class="win-sw" style="background:'+wc+'"></div>'
    +'<div><div class="win-nm">'+win.c.name+'</div><div class="win-pt">'+win.c.party+'</div></div>'
    +'<div class="win-sc" style="color:'+wc+'">'+Math.round(win.v/tv*100)+'%</div></div>'
    +'<div class="sec">Résultats</div>'+bars
    +'<hr class="div"><div class="sec">Bureaux de vote</div>'+bvList;
}

function openSheet(arr){
  ST.selArr=arr;
  const key=ekey(), bvs=Object.values(DB[arr]);
  const agg={}; let tv=0,ti=0;
  bvs.forEach(bv=>{
    const r=bv.results[key]; if(!r)return;
    tv+=r.total; ti+=bv.inscrits;
    CANDS[ST.year].forEach(c=>{
      if(!agg[c.id])agg[c.id]={v:0,wins:0,c};
      agg[c.id].v+=r.scores[c.id]||0;
      if(r.winner===c.id)agg[c.id].wins++;
    });
  });
  const sorted=Object.values(agg).sort((a,b)=>b.v-a.v);
  const win=sorted[0], part=ti?Math.round(tv/ti*100):0;
  const wc=ST.view==='bloc'?(BLOCS[win.c.bloc]?.color||'#888'):win.c.color;

  document.getElementById('sh-ttl').textContent=arr+(arr<=2?'er':'e')+' arrondissement';
  document.getElementById('sh-meta').textContent=bvs.length+' bureaux · Participation '+part+'%';

  const bars=sorted.map(({c,v,wins})=>{
    const pct=Math.round(v/tv*100);
    const col=ST.view==='bloc'?(BLOCS[c.bloc]?.color||'#888'):c.color;
    return '<div class="bar"><div class="bar-hd"><span class="bar-nm">'+c.name
      +' <span style="color:#bbb;font-weight:400">'+c.party+'</span></span>'
      +'<span class="bar-st">'+wins+' BV · '+pct+'%</span></div>'
      +'<div class="bar-bg"><div class="bar-fl" style="width:'+pct+'%;background:'+col+'"></div></div></div>';
  }).join('');

  const bvList=bvs.map(bv=>{
    const r=bv.results[key]; if(!r)return'';
    const cand=CANDS[ST.year].find(c=>c.id===r.winner);
    const col=ST.view==='bloc'?(BLOCS[cand?.bloc]?.color||'#888'):(cand?.color||'#888');
    const pct=Math.round((r.scores[r.winner]||0)/r.total*100);
    return '<div class="bv" onclick="flyBV('+bv.lat+','+bv.lng+')">'
      +'<div class="bv-c" style="background:'+col+'"></div>'
      +'<div class="bv-id">'+bv.id+'</div>'
      +'<div class="bv-nm">'+(cand?.name||'—')+'</div>'
      +'<div class="bv-pc">'+pct+'%</div></div>';
  }).join('');

  document.getElementById('sh-body').innerHTML=
    '<div class="win-card" style="background:'+wc+'15;border-left:4px solid '+wc+'">'
    +'<div class="win-sw" style="background:'+wc+'"></div>'
    +'<div><div class="win-nm">'+win.c.name+'</div><div class="win-pt">'+win.c.party+'</div></div>'
    +'<div class="win-sc" style="color:'+wc+'">'+Math.round(win.v/tv*100)+'%</div></div>'
    +'<div class="sec">Résultats</div>'+bars
    +'<hr class="div">'
    +'<div class="sec">Bureaux de vote</div>'+bvList;

  const sheet=document.getElementById('sheet');
  sheet.classList.remove('peek');
  sheet.classList.add('open');

  map.flyTo(ARR_CTR[arr],14,{duration:.7,animate:true});
  setTimeout(rebuildBV,800);
}

function closeSheet(){
  const sheet=document.getElementById('sheet');
  sheet.classList.remove('open','peek');
  ST.selArr=null;
  bvGroup.clearLayers();
  map.flyTo([48.857,2.347],12,{duration:.6,animate:true});
}

function flyBV(lat,lng){ map.flyTo([lat,lng],17,{duration:.5,animate:true}); }

function initSheetDrag(){
  const bar=document.getElementById('sh-drag');
  const sheet=document.getElementById('sheet');
  let sy=0;
  bar.addEventListener('touchstart',e=>{ sy=e.touches[0].clientY; },{passive:true});
  bar.addEventListener('touchend',e=>{
    const dy=e.changedTouches[0].clientY-sy;
    if(dy>40){ sheet.classList.contains('open')?sheet.classList.replace('open','peek'):closeSheet(); }
    else if(dy<-40){ sheet.classList.replace('peek','open'); }
    else { // tap = toggle
      if(sheet.classList.contains('open'))sheet.classList.replace('open','peek');
      else if(sheet.classList.contains('peek'))sheet.classList.replace('peek','open');
    }
  },{passive:true});
}

// ════════════════════════════════════════════════════════════
// CONTROLS
// ════════════════════════════════════════════════════════════
function syncSeg(id,val){ document.querySelectorAll('#'+id+' button').forEach(b=>b.classList.toggle('on',b.dataset.v===val)); }

function setYear(btn){ ST.year=btn.dataset.v; syncSeg('sg-yr',ST.year); renderAll(); }
function setTour(btn){ ST.tour=btn.dataset.v; syncSeg('sg-tr',ST.tour); renderAll(); }
function setView(btn){ ST.view=btn.dataset.v; syncSeg('sg-vw',ST.view); renderAll(); }

function toggleLive(){
  ST.live=!ST.live;
  const btn=document.getElementById('btn-live');
  const dot=document.getElementById('live-dot');
  btn.className='action'+(ST.live?' red':'');
  btn.innerHTML='<span class="live-dot'+(ST.live?' blinking':'')+'" id="live-dot"></span>'+(ST.live?'Stop live':'Live');
  if(ST.live){
    liveTimer=setInterval(()=>{
      const arr=Math.ceil(Math.random()*20);
      const bvs=Object.keys(DB[arr]);
      const id=bvs[Math.floor(Math.random()*bvs.length)];
      const r=DB[arr][id].results[ekey()]; if(!r)return;
      const cs=CANDS[ST.year];
      const i=Math.floor(Math.random()*cs.length),j=(i+1)%cs.length;
      const d=Math.floor(r.total*.03);
      r.scores[cs[i].id]=Math.max(0,(r.scores[cs[i].id]||0)+d);
      r.scores[cs[j].id]=Math.max(0,(r.scores[cs[j].id]||0)-d);
      r.winner=cs.reduce((a,x)=>r.scores[a.id]>r.scores[x.id]?a:x).id;
      updateArrColors();
      if(ST.selArr)openSheet(ST.selArr);
    },2200);
  } else { clearInterval(liveTimer); }
}

async function runAnim(){
  if(animRunning)return;
  animRunning=true;
  const btn=document.getElementById('btn-anim');
  btn.className='action amber'; btn.textContent='⏳ Animation…';
  ST.year='2014'; ST.tour='T2'; syncSeg('sg-yr','2014'); syncSeg('sg-tr','T2'); renderAll();
  await new Promise(r=>setTimeout(r,2600));
  ST.year='2020'; ST.tour='T2'; syncSeg('sg-yr','2020'); syncSeg('sg-tr','T2'); renderAll();
  await new Promise(r=>setTimeout(r,700));
  btn.className='action'; btn.textContent='▶ 2014→2020'; animRunning=false;
}
</script>
